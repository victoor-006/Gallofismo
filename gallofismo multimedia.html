<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet">
    <title>El Gallofismo</title>
    <link rel="stylesheet" href="gallofismo.css">
    <script>
        function currentDiv(n) {
            showDivs(slideIndex = n);
        }

        function showDivs(n) {
            var i;
            var x = document.getElementsByClassName("mySlides");
            var dots = document.getElementsByClassName("demo");
            if (n > x.length) { slideIndex = 1 }
            if (n < 1) { slideIndex = x.length }
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].className = dots[i].className.replace(" w3-opacity-off", "");
            }
            x[slideIndex - 1].style.display = "block";
            dots[slideIndex - 1].className += " w3-opacity-off";
        }
    </script>
    <style>
        section{
            margin-right: 80px; 
            margin-left: 80px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Web Oficial del Gallofismo</h1>
    </header>

    <nav>
        <ul>
            <li><a href="gallofismo.html">Origen</a></li>
            <li><a href="gallofimso elsantuario.html">El Santuario</a></li>
            <li><a href="gallofismo multimedia.html">Multimedia</a></li>
            <li><a href="gallofismo inscripcion.html">Unirse al Corral</a></li>
        </ul>
        <a href="javascript:history.back()" class="btn-atras">Volver</a>
    </nav>
    <main>
        <section id="gallofa">
             <h2>Galeria Oficial del Gallofismo</h2>
            <div class="w3-content">
                <img class="mySlides" src="Fotos/1.jpg" style="display:none">
                <img class="mySlides" src="Fotos/2.jpg">
                <img class="mySlides" src="Fotos/3.jpg" style="display:none">
                <img class="mySlides" src="Fotos/4.jpg" style="display:none">
                <img class="mySlides" src="Fotos/5.jpg" style="display:none">
                <video class="mySlides" controls style="display:none; height: auto; width: 500px;">
                    <source src="Fotos/v1.mp4" type="video/mp4">
                </video>
            </div>
            <div class="w3-row-padding w3-section">
                <div class="w3-col s4">
                    <img class="demo w3-opacity w3-hover-opacity-off" src="Fotos/1.jpg" onclick="currentDiv(1)">
                </div>
                <div class="w3-col s4">
                    <img class="demo w3-opacity w3-hover-opacity-off" src="Fotos/2.jpg" onclick="currentDiv(2)">
                </div>
                <div class="w3-col s4">
                    <img class="demo w3-opacity w3-hover-opacity-off" src="Fotos/3.jpg" onclick="currentDiv(3)">
                </div>
                <div class="w3-col s4">
                    <img class="demo w3-opacity w3-hover-opacity-off" src="Fotos/4.jpg" onclick="currentDiv(4)">
                </div>
                <div class="w3-col s4">
                    <img class="demo w3-opacity w3-hover-opacity-off" src="Fotos/5.jpg" onclick="currentDiv(5)">
                </div>
                <div class="w3-col s4">
                    <img class="demo w3-opacity w3-hover-opacity-off" src="Fotos/v1.jpg" onclick="currentDiv(6)">
                </div>
            </div>
        </section>
    </main>
